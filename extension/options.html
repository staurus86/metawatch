<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaWatch Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-width: 360px; max-width: 520px; margin: 0 auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #2d3748; background: #f7fafc; padding: 28px 24px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: #1a202c; display: flex; align-items: center; gap: 8px; }
    .subtitle { font-size: 13px; color: #718096; margin-bottom: 28px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
    input[type=url], input[type=text] {
      width: 100%; padding: 9px 12px; border: 1px solid #e2e8f0;
      border-radius: 6px; font-size: 13px; color: #2d3748;
    }
    input:focus { outline: none; border-color: #4299e1; }
    .hint { font-size: 11px; color: #718096; margin-top: 4px; }
    .actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 9px 18px; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #4299e1; color: white; }
    .btn-ghost { background: white; color: #2d3748; border: 1px solid #e2e8f0; }
    .status-row { display: flex; align-items: center; gap: 10px; margin-top: 20px; padding: 12px 14px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-size: 13px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.ok  { background: #48bb78; box-shadow: 0 0 0 3px rgba(72,187,120,.2); }
    .status-dot.err { background: #e53e3e; box-shadow: 0 0 0 3px rgba(229,62,62,.2); }
    .status-dot.idle { background: #a0aec0; }
    #status-text { color: #718096; }
    .banner { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .banner-ok  { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .banner-err { background: #fff5f5; color: #9b2c2c; border: 1px solid #fed7d7; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a202c; color: #e2e8f0; }
      h1 { color: #e2e8f0; }
      input[type=url], input[type=text] { background: #2d3748; border-color: #4a5568; color: #e2e8f0; }
      .btn-ghost { background: #2d3748; color: #e2e8f0; border-color: #4a5568; }
      .status-row { background: #2d3748; border-color: #4a5568; }
    }
  </style>
</head>
<body>
  <h1>👁 MetaWatch Settings</h1>
  <p class="subtitle">Configure your connection to MetaWatch</p>

  <div id="banner" style="display:none"></div>

  <div class="field">
    <label for="mw-url">MetaWatch URL</label>
    <input type="url" id="mw-url" placeholder="https://your-metawatch.com">
    <p class="hint">The URL where your MetaWatch instance is deployed</p>
  </div>

  <div class="field">
    <label for="mw-key">API Key</label>
    <input type="text" id="mw-key" placeholder="your-api-key-here">
    <p class="hint">Find your key at <strong>MetaWatch → Profile & API Key</strong></p>
  </div>

  <div class="actions">
    <button id="save-btn" class="btn btn-primary">Save Settings</button>
    <button id="test-btn" class="btn btn-ghost">Test Connection</button>
  </div>

  <div class="status-row">
    <div id="status-dot" class="status-dot idle"></div>
    <span id="status-text">Not tested yet</span>
  </div>

  <script src="options.js"></script>
</body>
</html>
