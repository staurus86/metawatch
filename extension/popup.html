<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MetaWatch</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <span class="logo">👁</span>
    <span class="logo-text">MetaWatch</span>
    <button id="settings-btn" class="settings-btn" title="Settings">⚙</button>
  </div>

  <div id="main-panel" class="panel">
    <div id="domain-info" class="domain-info">Loading active tab...</div>

    <div id="status-section" class="status-section" style="display:none">
      <div class="status-row">
        <div id="status-dot" class="status-dot"></div>
        <div>
          <div id="status-text" class="status-text"></div>
          <div id="status-sub" class="status-sub"></div>
        </div>
      </div>
      <div class="metrics">
        <div class="metric">
          <div id="rt-val" class="metric-val">—</div>
          <div class="metric-label">Response</div>
        </div>
        <div class="metric">
          <div id="uptime-val" class="metric-val">—</div>
          <div class="metric-label">Uptime 30d</div>
        </div>
      </div>
    </div>

    <div id="not-configured" style="display:none" class="not-configured">
      <div class="not-configured-text">MetaWatch URL and API key are not configured.</div>
      <button id="open-settings-btn" class="btn btn-primary">Open Settings</button>
    </div>

    <div id="not-monitored" style="display:none" class="not-monitored">
      <div style="font-size:13px;color:#718096;text-align:center;padding:8px 0">Not monitored in MetaWatch</div>
    </div>

    <div id="loading" class="loading"><span class="loading-spinner"></span>Checking...</div>
    <div id="error-msg" class="error-msg" style="display:none"></div>

    <div id="actions" class="actions">
      <button id="add-btn" class="btn btn-primary" style="display:none">+ Add to Monitor</button>
      <button id="view-btn" class="btn btn-ghost" style="display:none">View Details</button>
    </div>
    <button id="dashboard-btn" class="dashboard-link-btn">Open Dashboard</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
