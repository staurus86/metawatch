<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — MetaWatch</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f7fb;
      color: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      text-align: center;
    }
    .box {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      max-width: 460px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0; color: #64748b; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="box">
    <h1>You're offline</h1>
    <p>MetaWatch requires internet connection for live checks and dashboard updates.</p>
  </div>
</body>
</html>
